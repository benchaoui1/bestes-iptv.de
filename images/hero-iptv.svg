<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="IPTV Streaming auf mehreren Geräten — Smart TV, Firestick, Smartphone, Tablet">
  <title>IPTV Streaming Illustration — Multi-Device Setup für Deutschland</title>
  <desc>Illustration zeigt IPTV-Streaming auf Smart TV, Amazon Firestick, Smartphone und Tablet mit 4K Ultra HD Qualität.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/><stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" x2="1">
      <stop offset="0" stop-color="#C8102E"/><stop offset="1" stop-color="#FFD600"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="16"/>
  <!-- Smart TV center -->
  <rect x="220" y="80" width="360" height="220" rx="12" fill="#000" stroke="url(#grad)" stroke-width="3"/>
  <rect x="235" y="95" width="330" height="180" rx="4" fill="#0f0f0f"/>
  <polygon points="370,150 370,220 430,185" fill="#FFD600"/>
  <text x="290" y="260" font-family="Arial" font-size="14" fill="#FFD600" font-weight="bold">4K ULTRA HD · LIVE</text>
  <rect x="370" y="305" width="60" height="8" fill="#333"/>
  <rect x="310" y="315" width="180" height="20" rx="4" fill="#1a1a1a"/>
  <!-- Phone left -->
  <rect x="60" y="200" width="80" height="150" rx="10" fill="#000" stroke="url(#grad)" stroke-width="2"/>
  <rect x="68" y="215" width="64" height="115" rx="4" fill="#0f0f0f"/>
  <polygon points="88,250 88,290 116,270" fill="#FFD600"/>
  <!-- Tablet right -->
  <rect x="640" y="180" width="120" height="170" rx="8" fill="#000" stroke="url(#grad)" stroke-width="2"/>
  <rect x="650" y="195" width="100" height="140" rx="4" fill="#0f0f0f"/>
  <polygon points="685,245 685,285 715,265" fill="#FFD600"/>
  <!-- WiFi waves -->
  <g fill="none" stroke="#C8102E" stroke-width="2" opacity="0.6">
    <path d="M 180 380 Q 400 320 620 380"/>
    <path d="M 200 410 Q 400 360 600 410"/>
    <path d="M 220 430 Q 400 400 580 430"/>
  </g>
  <!-- Stats badges -->
  <g font-family="Arial" font-weight="bold">
    <rect x="40" y="40" width="140" height="36" rx="18" fill="#C8102E"/>
    <text x="60" y="64" fill="white" font-size="14">80.000+ SENDER</text>
    <rect x="620" y="40" width="140" height="36" rx="18" fill="#FFD600"/>
    <text x="660" y="64" fill="#0a0a0a" font-size="14">99,9% UPTIME</text>
  </g>
</svg>
